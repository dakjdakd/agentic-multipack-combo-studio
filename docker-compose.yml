services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DEMO_MODE: ${DEMO_MODE:-true}
      APP_ENV: ${APP_ENV:-local}
      APP_DB_URL: ${APP_DB_URL:-sqlite:///./data/app.db}
      ARTIFACT_DIR: ${ARTIFACT_DIR:-./artifacts}
      SAMPLES_DIR: ${SAMPLES_DIR:-./samples}
      SSB_DB_DIALECT: ${SSB_DB_DIALECT:-mysql}
      SSB_DB_HOST: ${SSB_DB_HOST:-}
      SSB_DB_PORT: ${SSB_DB_PORT:-3306}
      SSB_DB_USER: ${SSB_DB_USER:-}
      SSB_DB_PASSWORD: ${SSB_DB_PASSWORD:-}
      SSB_DB_NAME: ${SSB_DB_NAME:-}
      SSB_DB_CHARSET: ${SSB_DB_CHARSET:-utf8mb4}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-flash}
      VISION_MODEL: ${VISION_MODEL:-}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-agnes}
      IMAGE_BASE_URL: ${IMAGE_BASE_URL:-https://apihub.agnes-ai.com}
      IMAGE_API_KEY: ${IMAGE_API_KEY:-}
      IMAGE_MODEL: ${IMAGE_MODEL:-agnes-image-2.1-flash}
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-tavily}
      SEARCH_BASE_URL: ${SEARCH_BASE_URL:-https://api.tavily.com}
      SEARCH_API_KEY: ${SEARCH_API_KEY:-}
      BUDGET_TARGET_RMB: ${BUDGET_TARGET_RMB:-1500}
      USD_TO_RMB: ${USD_TO_RMB:-7.2}
      LLM_INPUT_USD_PER_MILLION: ${LLM_INPUT_USD_PER_MILLION:-0.30}
      LLM_OUTPUT_USD_PER_MILLION: ${LLM_OUTPUT_USD_PER_MILLION:-1.20}
      IMAGE_GENERATION_USD: ${IMAGE_GENERATION_USD:-0.003}
      SEARCH_REQUEST_USD: ${SEARCH_REQUEST_USD:-0.005}
      CACHE_TTL_HOURS: ${CACHE_TTL_HOURS:-24}
      MAX_IMAGE_RETRIES: ${MAX_IMAGE_RETRIES:-2}
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
      - ./samples:/app/samples

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
